version: '3.8'

services:
  pz3-api:
    image: Vorontsovaann/egecourses:latest
    container_name: pz3-container-v18
    ports:
      - "8018:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped
    
    volumes:
      - sqlite_data:/app

    healthcheck:
      test: ["CMD", "ps", "-aux"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sqlite_data:
    driver: local